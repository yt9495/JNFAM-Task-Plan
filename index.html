<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏭 JNFAM Task Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0a0e17;
  --navy:    #111827;
  --surface: #1a2234;
  --surface2:#1e2a3a;
  --border:  #1e3a5f;
  --accent:  #00d4ff;
  --green:   #00e676;
  --yellow:  #ffd600;
  --red:     #ff4444;
  --orange:  #ff6b35;
  --white:   #e8f4fd;
  --dim:     #7a9bbf;
  --muted:   #2a3a4a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}

/* HEADER */
.header{position:relative;z-index:1;background:var(--navy);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:4px;color:var(--accent);text-shadow:0 0 20px rgba(0,212,255,.4);}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:3px;margin-top:2px;}
.header-right{display:flex;gap:10px;align-items:center;}
.sync-status{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--dim);}
.sync-dot.connected{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
.sync-dot.syncing{background:var(--yellow);animation:pulse .5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.today-badge{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);}

/* TABS */
.tabs{position:relative;z-index:1;display:flex;background:var(--navy);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;}
.tab{padding:11px 18px;border:none;background:transparent;color:var(--dim);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--white);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}

/* MAIN */
.main{position:relative;z-index:1;padding:20px 24px;}

/* CONTROLS */
.controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
.month-nav{display:flex;align-items:center;gap:12px;}
.nav-btn{width:34px;height:34px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--white);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.month-title{font-family:'Bebas Neue',cursive;font-size:30px;letter-spacing:3px;color:var(--accent);min-width:160px;}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;}
.stat-chip{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 11px;font-size:12px;}
.stat-dot{width:7px;height:7px;border-radius:50%;}

/* CALENDAR */
.calendar{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);}
.cal-dow{padding:11px 0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;border-right:1px solid var(--border);}
.cal-dow:last-child{border-right:none;}
.cal-dow.sat{color:#7cafd4;}.cal-dow.sun{color:var(--red);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-day{min-height:115px;padding:7px 5px 3px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;transition:background .15s;cursor:pointer;}
.cal-day:nth-child(7n){border-right:none;}
.cal-day:hover{background:rgba(0,212,255,.04);}
.cal-day.other-month{opacity:.25;}
.cal-day.today{background:rgba(0,212,255,.06);box-shadow:inset 0 0 0 1px var(--accent);}
.cal-day.sat .day-num{color:#7cafd4;}.cal-day.sun .day-num{color:var(--red);}
.day-num{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--white);display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.today-label{font-size:8px;background:var(--accent);color:#000;border-radius:3px;padding:1px 4px;font-weight:700;}
.task-chip{display:flex;align-items:center;gap:3px;padding:2px 5px;border-radius:3px;font-size:9px;margin-bottom:2px;cursor:pointer;transition:opacity .15s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.task-chip:hover{opacity:.75;}
.task-chip.done  {color:var(--green); background:rgba(0,230,118,.1); border-left-color:var(--green);}
.task-chip.inprog{color:var(--accent);background:rgba(0,212,255,.1); border-left-color:var(--accent);font-weight:700;}
.task-chip.late  {color:var(--red);   background:rgba(255,68,68,.1);  border-left-color:var(--red);}
.task-chip.soon  {color:var(--yellow);background:rgba(255,214,0,.1);  border-left-color:var(--yellow);}
.task-chip.plan  {color:var(--dim);   background:rgba(122,155,191,.07);border-left-color:var(--muted);}
.task-more{font-size:9px;color:var(--dim);padding:1px 5px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--navy);border:1px solid var(--border);border-radius:16px;width:500px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:slideUp .2s ease;}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-date{font-family:'Bebas Neue',cursive;font-size:22px;color:var(--accent);}
.modal-close{background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;padding:2px 8px;border-radius:6px;}
.modal-close:hover{color:var(--white);background:var(--surface);}
.modal-body{padding:18px 22px;}
.modal-task-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:9px;position:relative;}
.modal-task-text{font-size:14px;font-weight:500;margin-bottom:8px;}
.modal-task-meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.meta-chip{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:4px;background:var(--surface2);color:var(--dim);}
.status-select{font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--surface2);border:1px solid var(--border);color:var(--white);border-radius:4px;padding:3px 7px;cursor:pointer;}
.status-select:focus{outline:none;border-color:var(--accent);}
.del-btn{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px;}
.del-btn:hover{color:var(--red);background:rgba(255,68,68,.1);}

/* ADD FORM */
.add-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;max-width:580px;}
.add-panel h3{font-size:12px;color:var(--dim);letter-spacing:2px;font-family:'JetBrains Mono',monospace;margin-bottom:18px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.single{grid-template-columns:1fr;}
.form-label{font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:4px;font-family:'JetBrains Mono',monospace;}
.form-input,.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--white);border-radius:6px;padding:8px 11px;font-family:'Noto Sans KR',sans-serif;font-size:13px;transition:border-color .2s;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--accent);}
.form-select option{background:var(--navy);}
.btn-add{background:var(--accent);color:#000;font-weight:700;border:none;border-radius:8px;padding:10px 24px;font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn-add:hover{background:#33ddff;transform:translateY(-1px);}
.btn-add:disabled{background:var(--muted);color:var(--dim);cursor:not-allowed;transform:none;}

/* LIST */
.list-header{display:grid;grid-template-columns:2fr 1fr 80px 90px 100px;gap:10px;padding:8px 14px;margin-bottom:6px;}
.list-hdr{font-size:10px;color:var(--dim);letter-spacing:2px;font-family:'JetBrains Mono',monospace;}
.list-item{display:grid;grid-template-columns:2fr 1fr 80px 90px 100px;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin-bottom:5px;transition:border-color .2s;}
.list-item:hover{border-color:rgba(0,212,255,.3);}
.list-text{font-size:13px;}
.list-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);}
.dday{font-family:'JetBrains Mono',monospace;font-size:12px;}
.dday.late{color:var(--red)}.dday.soon{color:var(--yellow)}.dday.ok{color:var(--dim)}.dday.done{color:var(--green)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:13px;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#000;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:700;transform:translateY(60px);opacity:0;transition:all .3s;z-index:200;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{background:var(--red);color:#fff;}

/* FILTER ROW */
.filter-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.filter-select{background:var(--surface);border:1px solid var(--border);color:var(--white);border-radius:6px;padding:7px 11px;font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;}
.filter-select:focus{outline:none;border-color:var(--accent);}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="logo">JNFAM TASK CALENDAR</div>
    <div class="logo-sub">// PRODUCTION WORK PLAN · REAL-TIME SYNC</div>
  </div>
  <div class="header-right">
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">연결 중...</span>
    </div>
    <div class="today-badge" id="todayBadge"></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('calendar',this)">📅 달력</button>
  <button class="tab" onclick="switchTab('list',this)">📋 목록</button>
  <button class="tab" onclick="switchTab('add',this)">➕ Task 추가</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CALENDAR TAB -->
  <div id="tab-calendar">
    <div class="controls">
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="month-title" id="monthTitle"></div>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="stats-row" id="statsRow"></div>
    </div>
    <div class="calendar">
      <div class="cal-header">
        <div class="cal-dow">MON</div><div class="cal-dow">TUE</div>
        <div class="cal-dow">WED</div><div class="cal-dow">THU</div>
        <div class="cal-dow">FRI</div>
        <div class="cal-dow sat">SAT</div><div class="cal-dow sun">SUN</div>
      </div>
      <div class="cal-grid" id="calGrid">
        <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>데이터 로딩 중...</div>
      </div>
    </div>
  </div>

  <!-- LIST TAB -->
  <div id="tab-list" style="display:none">
    <div class="filter-row">
      <select class="filter-select" id="filterStatus" onchange="renderList()">
        <option value="">전체 상태</option>
        <option>예정</option><option>진행중</option><option>완료</option><option>보류</option>
      </select>
      <select class="filter-select" id="filterMonth" onchange="renderList()">
        <option value="">전체 월</option>
        <option value="05">5월</option><option value="06">6월</option>
        <option value="07">7월</option><option value="08">8월</option>
        <option value="09">9월</option><option value="10">10월</option>
        <option value="11">11월</option><option value="12">12월</option>
      </select>
      <select class="filter-select" id="filterCat" onchange="renderList()">
        <option value="">전체 카테고리</option>
        <option>생산</option><option>출하</option><option>입고</option>
        <option>점검</option><option>미팅</option><option>행정</option><option>기타</option>
      </select>
    </div>
    <div class="list-header">
      <div class="list-hdr">TASK</div>
      <div class="list-hdr">마감일</div>
      <div class="list-hdr">D-DAY</div>
      <div class="list-hdr">카테고리</div>
      <div class="list-hdr">상태</div>
    </div>
    <div id="listContainer"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
  </div>

  <!-- ADD TAB -->
  <div id="tab-add" style="display:none">
    <div class="add-panel">
      <h3>// NEW TASK 추가</h3>
      <div class="form-row single">
        <div>
          <div class="form-label">TASK 내용 *</div>
          <input class="form-input" id="inp-text" placeholder="작업 내용을 입력하세요"/>
        </div>
      </div>
      <div class="form-row">
        <div>
          <div class="form-label">마감일 *</div>
          <input class="form-input" type="date" id="inp-deadline"/>
        </div>
        <div>
          <div class="form-label">담당자</div>
          <input class="form-input" id="inp-worker" placeholder="이름 입력"/>
        </div>
      </div>
      <div class="form-row">
        <div>
          <div class="form-label">카테고리</div>
          <select class="form-select" id="inp-cat">
            <option>생산</option><option>출하</option><option>입고</option><option>점검</option>
            <option>미팅</option><option>행정</option><option>기타</option>
          </select>
        </div>
        <div>
          <div class="form-label">우선순위</div>
          <select class="form-select" id="inp-prio">
            <option>높음</option><option>보통</option><option>낮음</option>
          </select>
        </div>
      </div>
      <div class="form-row single">
        <div>
          <div class="form-label">상태</div>
          <select class="form-select" id="inp-status">
            <option>예정</option><option>진행중</option><option>완료</option><option>보류</option>
          </select>
        </div>
      </div>
      <button class="btn-add" id="addBtn" onclick="addTask()">+ Task 추가</button>
    </div>
  </div>

</div>

<!-- DAY MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-date" id="modalDate"></div>
      <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('show')">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove, set }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase 설정 ───────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyBkY5IGIPC0CsJB55hui7wqCffcCiS33NI",
  authDomain:        "jnfam-task-plan.firebaseapp.com",
  databaseURL:       "https://jnfam-task-plan-default-rtdb.firebaseio.com",
  projectId:         "jnfam-task-plan",
  storageBucket:     "jnfam-task-plan.firebasestorage.app",
  messagingSenderId: "76859256151",
  appId:             "1:76859256151:web:c056fd641305780908e212",
  measurementId:     "G-QFEDHVDT6F"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const tasksRef = ref(db, 'tasks');

// ── 전역 상태 ───────────────────────────────────────
let tasks = {};   // { firebaseKey: taskObj }
let curYear  = new Date().getFullYear();
let curMonth = new Date().getMonth(); // 0-indexed

const today = new Date();
today.setHours(0,0,0,0);

// ── TODAY 배지 ───────────────────────────────────────
document.getElementById('todayBadge').textContent =
  today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

// ── 동기화 상태 ──────────────────────────────────────
function setSyncStatus(state) {
  const dot  = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  dot.className = 'sync-dot ' + state;
  if (state==='connected') text.textContent = '실시간 동기화 중';
  if (state==='syncing')   text.textContent = '저장 중...';
  if (state==='')          text.textContent = '연결 끊김';
}

// ── Firebase 실시간 리스너 ────────────────────────────
onValue(tasksRef, (snapshot) => {
  tasks = snapshot.val() || {};
  setSyncStatus('connected');
  renderCalendar();
  const activeList = document.getElementById('tab-list');
  if (activeList.style.display !== 'none') renderList();
}, (error) => {
  setSyncStatus('');
  showToast('연결 오류: ' + error.message, true);
});

// ── 유틸 ─────────────────────────────────────────────
function toDate(str) {
  const d = new Date(str + 'T00:00:00');
  d.setHours(0,0,0,0);
  return d;
}
function diffDays(dl) {
  return Math.round((toDate(dl) - today) / 86400000);
}
function taskClass(t) {
  if (t.status==='완료')   return 'done';
  if (t.status==='진행중') return 'inprog';
  const d = diffDays(t.deadline);
  if (d < 0)  return 'late';
  if (d <= 3) return 'soon';
  return 'plan';
}
function taskPrefix(t) {
  const c = taskClass(t);
  if (c==='done')   return '✓';
  if (c==='inprog') return '●';
  if (c==='late')   return '!';
  if (c==='soon')   return '◆';
  return '·';
}
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError?' error':'') + ' show';
  setTimeout(()=>t.className='toast', 2500);
}

// ── 탭 전환 ──────────────────────────────────────────
window.switchTab = (name, btn) => {
  ['calendar','list','add'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name?'block':'none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (name==='list') renderList();
};

// ── 월 이동 ──────────────────────────────────────────
window.changeMonth = (d) => {
  curMonth += d;
  if (curMonth > 11) { curMonth=0; curYear++; }
  if (curMonth < 0)  { curMonth=11; curYear--; }
  renderCalendar();
};

// ── 달력 렌더 ─────────────────────────────────────────
function renderCalendar() {
  const MO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('monthTitle').textContent = `${curYear}  ${MO[curMonth]}`;

  const first = new Date(curYear, curMonth, 1);
  let startDow = first.getDay();
  startDow = startDow===0 ? 6 : startDow-1;
  const calStart = new Date(first);
  calStart.setDate(calStart.getDate()-startDow);

  // 이달 Task 날짜별 그룹핑
  const byDate = {};
  const taskList = Object.entries(tasks);
  taskList.forEach(([key, t]) => {
    if (!t || !t.deadline) return;
    const mo = `${curYear}-${String(curMonth+1).padStart(2,'0')}`;
    if (t.deadline.startsWith(mo)) {
      if (!byDate[t.deadline]) byDate[t.deadline] = [];
      byDate[t.deadline].push({...t, _key: key});
    }
  });

  // 집계
  const mTasks = taskList.filter(([,t])=>t&&t.deadline&&t.deadline.startsWith(`${curYear}-${String(curMonth+1).padStart(2,'0')}`)).map(([,t])=>t);
  const total   = mTasks.length;
  const done    = mTasks.filter(t=>t.status==='완료').length;
  const inprog  = mTasks.filter(t=>t.status==='진행중').length;
  const delayed = mTasks.filter(t=>t.status!=='완료'&&diffDays(t.deadline)<0).length;

  document.getElementById('statsRow').innerHTML = [
    {l:'전체', v:total,   c:'var(--white)'},
    {l:'완료', v:done,    c:'var(--green)'},
    {l:'진행', v:inprog,  c:'var(--accent)'},
    {l:'지연', v:delayed, c:'var(--red)'},
    {l:'완료율',v:total?Math.round(done/total*100)+'%':'-',c:'var(--green)'},
  ].map(s=>`
    <div class="stat-chip">
      <div class="stat-dot" style="background:${s.c}"></div>
      <span style="color:var(--dim);font-size:11px">${s.l}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:${s.c}">${s.v}</span>
    </div>`).join('');

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  for (let i=0; i<42; i++) {
    const d = new Date(calStart);
    d.setDate(d.getDate()+i);
    const inMonth = d.getMonth()===curMonth && d.getFullYear()===curYear;
    const isToday = d.getTime()===today.getTime();
    const dow = d.getDay();
    const isSat = dow===6, isSun = dow===0;
    const ds = d.toISOString().slice(0,10);
    const dayTasks = byDate[ds]||[];

    let cls = 'cal-day';
    if (!inMonth) cls+=' other-month';
    if (isToday)  cls+=' today';
    if (isSat)    cls+=' sat';
    if (isSun)    cls+=' sun';

    const MAX=5;
    const chips = dayTasks.slice(0,MAX).map(t=>
      `<div class="task-chip ${taskClass(t)}" onclick="openDayModal('${ds}',event)">
        ${taskPrefix(t)} ${t.text}
      </div>`).join('');
    const more = dayTasks.length>MAX ? `<div class="task-more">+${dayTasks.length-MAX} more</div>` : '';

    const cell = document.createElement('div');
    cell.className = cls;
    cell.innerHTML = `
      <div class="day-num">
        <span>${d.getDate()}</span>
        ${isToday?'<span class="today-label">TODAY</span>':''}
      </div>${chips}${more}`;
    cell.onclick = (e) => {
      if (e.target === cell || e.target.classList.contains('day-num') || e.target.tagName==='SPAN') {
        openDayModal(ds, e);
      }
    };
    grid.appendChild(cell);
  }
}

// ── 날짜 모달 ─────────────────────────────────────────
window.openDayModal = (ds, e) => {
  if (e) e.stopPropagation();
  const d = new Date(ds+'T00:00:00');
  document.getElementById('modalDate').textContent =
    d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'});

  const dayTasks = Object.entries(tasks)
    .filter(([,t])=>t&&t.deadline===ds)
    .map(([k,t])=>({...t,_key:k}));

  const body = document.getElementById('modalBody');
  if (dayTasks.length===0) {
    body.innerHTML = `
      <div style="text-align:center;padding:28px;color:var(--dim)">
        <div style="font-size:28px;margin-bottom:8px">📋</div>
        <div>이 날짜에 Task가 없습니다</div>
      </div>
      <button class="btn-add" style="width:100%;margin-top:8px" onclick="prefillDate('${ds}')">+ 이 날짜에 Task 추가</button>`;
  } else {
    body.innerHTML = dayTasks.map(t => {
      const dd = diffDays(t.deadline);
      const ddTxt = t.status==='완료'?'완료됨':(dd<0?`${-dd}일 지연`:`D-${dd}`);
      return `
      <div class="modal-task-item">
        <button class="del-btn" onclick="deleteTask('${t._key}','${ds}')" title="삭제">×</button>
        <div class="modal-task-text">${t.text}</div>
        <div class="modal-task-meta">
          ${t.category?`<span class="meta-chip">${t.category}</span>`:''}
          ${t.worker?`<span class="meta-chip">${t.worker}</span>`:''}
          ${t.priority?`<span class="meta-chip">${t.priority}</span>`:''}
          <span class="meta-chip" style="color:${dd<0&&t.status!=='완료'?'var(--red)':'var(--dim)'}">${ddTxt}</span>
          <select class="status-select" onchange="updateStatus('${t._key}',this.value,'${ds}')">
            ${['예정','진행중','완료','보류'].map(s=>`<option${s===t.status?' selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>`;
    }).join('') +
    `<button class="btn-add" style="width:100%;margin-top:4px" onclick="prefillDate('${ds}')">+ 이 날짜에 Task 추가</button>`;
  }
  document.getElementById('modalOverlay').classList.add('show');
};

window.closeModal = (e) => {
  if (e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('show');
};

// ── 상태 업데이트 ────────────────────────────────────
window.updateStatus = async (key, val, ds) => {
  setSyncStatus('syncing');
  await update(ref(db, 'tasks/'+key), {status: val});
  setSyncStatus('connected');
  showToast('✓ 상태 업데이트됨');
  openDayModal(ds, null);
};

// ── Task 삭제 ─────────────────────────────────────────
window.deleteTask = async (key, ds) => {
  if (!confirm('이 Task를 삭제할까요?')) return;
  setSyncStatus('syncing');
  await remove(ref(db, 'tasks/'+key));
  setSyncStatus('connected');
  showToast('🗑 Task 삭제됨');
  openDayModal(ds, null);
};

// ── Task 추가 ─────────────────────────────────────────
window.addTask = async () => {
  const text = document.getElementById('inp-text').value.trim();
  const dl   = document.getElementById('inp-deadline').value;
  if (!text||!dl) { showToast('Task 내용과 마감일을 입력하세요', true); return; }
  const btn = document.getElementById('addBtn');
  btn.disabled = true; btn.textContent = '저장 중...';
  setSyncStatus('syncing');
  await push(tasksRef, {
    text, deadline: dl,
    worker:   document.getElementById('inp-worker').value.trim()||'',
    category: document.getElementById('inp-cat').value,
    priority: document.getElementById('inp-prio').value,
    status:   document.getElementById('inp-status').value,
    createdAt: new Date().toISOString(),
  });
  setSyncStatus('connected');
  btn.disabled=false; btn.textContent='+ Task 추가';
  document.getElementById('inp-text').value='';
  document.getElementById('inp-worker').value='';
  showToast('✓ Task가 추가되었습니다!');
  // 해당 월로 이동
  const [y,m] = dl.split('-').map(Number);
  curYear=y; curMonth=m-1;
  switchTab('calendar', document.querySelectorAll('.tab')[0]);
};

// ── 날짜 미리채우기 ──────────────────────────────────
window.prefillDate = (ds) => {
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('inp-deadline').value = ds;
  switchTab('add', document.querySelectorAll('.tab')[2]);
};

// ── 목록 렌더 ────────────────────────────────────────
function renderList() {
  const fs = document.getElementById('filterStatus').value;
  const fm = document.getElementById('filterMonth').value;
  const fc = document.getElementById('filterCat').value;
  let list = Object.entries(tasks)
    .filter(([,t])=>t&&t.deadline)
    .map(([k,t])=>({...t,_key:k}));
  if (fs) list = list.filter(t=>t.status===fs);
  if (fm) list = list.filter(t=>t.deadline.startsWith(`${curYear}-${fm}`));
  if (fc) list = list.filter(t=>t.category===fc);
  list.sort((a,b)=>a.deadline.localeCompare(b.deadline));

  const ddClass = (t) => {
    if (t.status==='완료') return 'done';
    const d=diffDays(t.deadline);
    return d<0?'late':(d<=3?'soon':'ok');
  };
  const ddText = (t) => {
    if (t.status==='완료') return '✓';
    const d=diffDays(t.deadline);
    return d<0?`-${-d}일`:`D-${d}`;
  };

  document.getElementById('listContainer').innerHTML = list.length
    ? list.map(t=>`
      <div class="list-item">
        <div>
          <div class="list-text">${t.text}</div>
          <div class="list-meta">${t.worker||''} ${t.worker&&t.category?'·':''} ${t.category||''}</div>
        </div>
        <div class="list-meta">${t.deadline}</div>
        <div class="dday ${ddClass(t)}">${ddText(t)}</div>
        <div class="list-meta">${t.category||'-'}</div>
        <div>
          <select class="status-select" onchange="updateStatusList('${t._key}',this.value)">
            ${['예정','진행중','완료','보류'].map(s=>`<option${s===t.status?' selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>`).join('')
    : '<div style="text-align:center;padding:40px;color:var(--dim)">Task가 없습니다</div>';
}

window.updateStatusList = async (key, val) => {
  setSyncStatus('syncing');
  await update(ref(db,'tasks/'+key), {status:val});
  setSyncStatus('connected');
  showToast('✓ 상태 업데이트됨');
};
