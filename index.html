<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏭 JNFAM Task Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f4f6fb;
  --white:    #ffffff;
  --surface:  #ffffff;
  --surface2: #f8f9fc;
  --border:   #e4e8f0;
  --border2:  #d0d7e8;
  --accent:   #2563eb;
  --accent-l: #eff4ff;
  --green:    #16a34a;
  --green-l:  #f0fdf4;
  --yellow:   #d97706;
  --yellow-l: #fffbeb;
  --red:      #dc2626;
  --red-l:    #fef2f2;
  --orange:   #ea580c;
  --cyan:     #0891b2;
  --text:     #1e2533;
  --text2:    #5a6478;
  --text3:    #9aa3b5;
  --shadow:   0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 4px 20px rgba(0,0,0,.10), 0 12px 40px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}

/* HEADER */
.header{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.06);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;}
.logo-text{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--text);}
.logo-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.header-right{display:flex;align-items:center;gap:12px;}
.sync-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:12px;color:var(--text2);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
.sync-dot.connected{background:var(--green);}
.sync-dot.syncing{background:var(--yellow);animation:blink .5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.today-chip{padding:5px 12px;border-radius:20px;background:var(--accent-l);border:1px solid #bfdbfe;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);font-weight:600;}

/* TABS */
.tabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:2px;}
.tab{padding:13px 16px;border:none;background:transparent;color:var(--text3);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* MAIN */
.main{padding:24px 28px;}

/* CONTROLS */
.controls{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
.controls-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.month-nav{display:flex;align-items:center;gap:10px;}
.nav-btn{width:34px;height:34px;border-radius:8px;background:var(--white);border:1px solid var(--border);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;box-shadow:var(--shadow);}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.month-title{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:var(--text);min-width:140px;}
.stats-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.stat-chip{display:flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;box-shadow:var(--shadow);}
.stat-dot{width:7px;height:7px;border-radius:50%;}
.stat-val{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;}

/* CALENDAR */
.calendar{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
.cal-header{display:grid;grid-template-columns:repeat(5,1fr) 0.55fr;background:var(--surface2);border-bottom:1px solid var(--border);}
.cal-dow{padding:10px 0;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1px;color:var(--text3);border-right:1px solid var(--border);}
.cal-dow:last-child{border-right:none;}
.cal-dow.sat{color:var(--cyan);}.cal-dow.sun{color:var(--red);}.cal-dow.wknd{color:var(--text3);font-size:10px;}
.cal-grid{display:grid;grid-template-columns:repeat(5,1fr) 0.55fr;}
.cal-day{height:120px;padding:8px 6px 4px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;overflow:hidden;}
.cal-day:nth-child(7n){border-right:none;}
.cal-day:hover{background:var(--accent-l);}
.cal-day.other-month{background:var(--surface2);opacity:.5;}
.cal-day.today{background:#eff4ff;box-shadow:inset 0 0 0 2px var(--accent);}
.cal-day.sat .day-num{color:var(--cyan);}.cal-day.sun .day-num{color:var(--red);}
.cal-day.weekend-cell{background:var(--surface2);font-size:10px;padding:6px 5px;}
.weekend-day-label{font-size:9px;font-weight:700;color:var(--text3);margin-bottom:3px;margin-top:6px;padding-top:4px;border-top:1px dashed var(--border);}
.weekend-day-label:first-child{margin-top:0;border-top:none;padding-top:0;}
.task-chip.weekend{font-size:9px;padding:2px 4px;}
.day-num{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.today-label{font-size:9px;background:var(--accent);color:#fff;border-radius:4px;padding:1px 5px;font-weight:700;}
.task-chip{display:flex;align-items:center;gap:3px;padding:3px 6px;border-radius:4px;font-size:10px;margin-bottom:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;border-left:2px solid transparent;}
.task-chip.done  {color:var(--green); background:var(--green-l); border-left-color:var(--green);}
.task-chip.inprog{color:var(--accent);background:var(--accent-l);border-left-color:var(--accent);}
.task-chip.late  {color:var(--red);   background:var(--red-l);   border-left-color:var(--red);}
.task-chip.soon  {color:var(--yellow);background:var(--yellow-l);border-left-color:var(--yellow);}
.task-chip.plan  {color:var(--text2); background:var(--surface2);border-left-color:var(--border2);}
.task-more{font-size:10px;color:var(--text3);padding:1px 6px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,37,51,.4);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--white);border:1px solid var(--border);border-radius:16px;width:500px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .18s ease;}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-date{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--text);}
.modal-close{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:2px 8px;border-radius:6px;line-height:1;}
.modal-close:hover{color:var(--red);background:var(--red-l);}
.modal-body{padding:18px 22px;}
.modal-task-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:9px;position:relative;}
.modal-task-text{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--text);}
.modal-task-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.meta-chip{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 8px;border-radius:4px;background:var(--white);border:1px solid var(--border);color:var(--text2);}
.status-select{font-size:11px;font-family:'Noto Sans KR',sans-serif;background:var(--white);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:3px 8px;cursor:pointer;}
.status-select:focus{outline:none;border-color:var(--accent);}
.del-btn{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:3px 7px;border-radius:5px;}
.del-btn:hover{color:var(--red);background:var(--red-l);}
.edit-btn{position:absolute;top:10px;right:38px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:3px 7px;border-radius:5px;}
.edit-btn:hover{color:var(--accent);background:var(--accent-l);}
.edit-form{margin-top:10px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--border);padding-top:10px;}
.edit-input{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:"Noto Sans KR",sans-serif;outline:none;background:var(--white);color:var(--text);}
.edit-input:focus{border-color:var(--accent);}
.edit-row{display:flex;gap:7px;}
.edit-row .edit-input{flex:1;}
.edit-save{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:"Noto Sans KR",sans-serif;}
.edit-save:hover{background:#1d4ed8;}
.edit-cancel{background:var(--white);color:var(--text2);border:1px solid var(--border);border-radius:7px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:"Noto Sans KR",sans-serif;}
.edit-cancel:hover{background:var(--surface2);}

/* ADD FORM */
.add-panel{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:600px;box-shadow:var(--shadow);}
.add-panel h3{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text3);letter-spacing:2px;margin-bottom:22px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.form-row.single{grid-template-columns:1fr;}
.form-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;}
.form-input,.form-select{width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-family:'Noto Sans KR',sans-serif;font-size:13px;transition:border-color .15s;outline:none;}
.form-input:focus,.form-select:focus{border-color:var(--accent);background:var(--white);}
.btn-add{background:var(--accent);color:#fff;font-weight:700;border:none;border-radius:8px;padding:10px 24px;font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;margin-top:6px;}
.btn-add:hover{background:#1d4ed8;}
.btn-add:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed;}
.btn-add-outline{background:var(--white);color:var(--accent);font-weight:700;border:1.5px solid var(--accent);border-radius:8px;padding:8px 18px;font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;width:100%;margin-top:8px;}
.btn-add-outline:hover{background:var(--accent-l);}

/* LIST */
.list-header{display:grid;grid-template-columns:2fr 1fr 80px 90px 100px;gap:10px;padding:8px 16px;margin-bottom:6px;}
.list-hdr{font-size:11px;font-weight:700;color:var(--text3);font-family:'IBM Plex Mono',monospace;letter-spacing:1px;}
.list-item{display:grid;grid-template-columns:2fr 1fr 80px 90px 100px;gap:10px;align-items:center;background:var(--white);border:1px solid var(--border);border-radius:9px;padding:12px 16px;margin-bottom:5px;transition:border-color .15s;box-shadow:var(--shadow);}
.list-item:hover{border-color:var(--accent);}
.list-text{font-size:13px;font-weight:500;}
.list-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);}
.dday{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;}
.dday.late{color:var(--red)}.dday.soon{color:var(--yellow)}.dday.ok{color:var(--text3)}.dday.done{color:var(--green)}

/* FILTER ROW */
.filter-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filter-select{background:var(--white);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 12px;font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;box-shadow:var(--shadow);}
.filter-select:focus{outline:none;border-color:var(--accent);}
.btn-dl{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;transition:all .15s;box-shadow:var(--shadow);}
.btn-dl-csv{background:var(--green-l);color:var(--green);border:1px solid #bbf7d0;}
.btn-dl-csv:hover{background:#dcfce7;}
.btn-dl-xlsx{background:var(--accent-l);color:var(--accent);border:1px solid #bfdbfe;}
.btn-dl-xlsx:hover{background:#dbeafe;}
.dl-group{display:flex;gap:8px;margin-left:auto;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--text3);font-size:13px;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:700;transform:translateY(60px);opacity:0;transition:all .25s;z-index:999;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{background:var(--red);}

/* EMPTY */
.empty{text-align:center;padding:48px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:10px;}

@media(max-width:768px){
  .header{padding:0 16px;}
  .main{padding:16px;}
  .tabs{padding:0 16px;}
  .form-row{grid-template-columns:1fr;}
  .list-header,.list-item{grid-template-columns:1fr 80px 80px;}
  .list-header .list-hdr:nth-child(4),.list-header .list-hdr:nth-child(5),
  .list-item>*:nth-child(4),.list-item>*:nth-child(5){display:none;}
  .cal-header,.cal-grid{grid-template-columns:repeat(5,1fr) 0.45fr;}
  .cal-day{height:80px;padding:5px 3px;overflow:hidden;}
  .weekend-cell{height:80px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">JN</div>
    <div>
      <div class="logo-text">JNFAM TASK CALENDAR</div>
      <div class="logo-sub">생산 작업 계획 · 실시간 동기화</div>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-badge">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">연결 중...</span>
    </div>
    <div class="today-chip" id="todayBadge"></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('calendar',this)">📅 달력</button>
  <button class="tab" onclick="switchTab('list',this)">📋 목록</button>
  <button class="tab" onclick="switchTab('add',this)">➕ Task 추가</button>
</div>

<div class="main">

  <!-- CALENDAR TAB -->
  <div id="tab-calendar">
    <div class="controls">
      <div class="controls-top">
        <div class="month-nav">
          <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
          <div class="month-title" id="monthTitle"></div>
          <button class="nav-btn" onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="stats-row" id="statsRow"></div>
    </div>
    <div class="calendar">
      <div class="cal-header">
        <div class="cal-dow">MON</div><div class="cal-dow">TUE</div>
        <div class="cal-dow">WED</div><div class="cal-dow">THU</div>
        <div class="cal-dow">FRI</div>
        <div class="cal-dow wknd">주말</div>
      </div>
      <div class="cal-grid" id="calGrid">
        <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>데이터 로딩 중...</div>
      </div>
    </div>
  </div>

  <!-- LIST TAB -->
  <div id="tab-list" style="display:none">
    <div class="filter-row">
      <select class="filter-select" id="filterStatus" onchange="renderList()">
        <option value="">전체 상태</option>
        <option>예정</option><option>진행중</option><option>완료</option><option>보류</option>
      </select>
      <select class="filter-select" id="filterMonth" onchange="renderList()">
        <option value="">전체 월</option>
        <option value="05">5월</option><option value="06">6월</option>
        <option value="07">7월</option><option value="08">8월</option>
        <option value="09">9월</option><option value="10">10월</option>
        <option value="11">11월</option><option value="12">12월</option>
      </select>
      <select class="filter-select" id="filterCat" onchange="renderList()">
        <option value="">전체 카테고리</option>
        <option>생산</option><option>출하</option><option>입고</option>
        <option>점검</option><option>미팅</option><option>행정</option><option>기타</option>
      </select>
      <div class="dl-group">
        <button class="btn-dl btn-dl-csv" onclick="downloadCSV()">⬇ CSV</button>
        <button class="btn-dl btn-dl-xlsx" onclick="downloadExcel()">⬇ Excel</button>
      </div>
    </div>
    <div class="list-header">
      <div class="list-hdr">TASK</div>
      <div class="list-hdr">마감일</div>
      <div class="list-hdr">D-DAY</div>
      <div class="list-hdr">카테고리</div>
      <div class="list-hdr">상태</div>
    </div>
    <div id="listContainer"><div class="loading"><div class="spinner"></div>로딩 중...</div></div>
  </div>

  <!-- ADD TAB -->
  <div id="tab-add" style="display:none">
    <div class="add-panel">
      <h3>// NEW TASK 추가</h3>
      <div class="form-row single">
        <div>
          <label class="form-label">TASK 내용 *</label>
          <input class="form-input" id="inp-text" placeholder="작업 내용을 입력하세요"/>
        </div>
      </div>
      <div class="form-row">
        <div>
          <label class="form-label">마감일 *</label>
          <input class="form-input" type="date" id="inp-deadline"/>
        </div>
        <div>
          <label class="form-label">담당자</label>
          <input class="form-input" id="inp-worker" placeholder="이름 입력"/>
        </div>
      </div>
      <div class="form-row">
        <div>
          <label class="form-label">카테고리</label>
          <select class="form-select" id="inp-cat">
            <option>생산</option><option>출하</option><option>입고</option><option>점검</option>
            <option>미팅</option><option>행정</option><option>기타</option>
          </select>
        </div>
        <div>
          <label class="form-label">우선순위</label>
          <select class="form-select" id="inp-prio">
            <option>높음</option><option>보통</option><option>낮음</option>
          </select>
        </div>
      </div>
      <div class="form-row single">
        <div>
          <label class="form-label">상태</label>
          <select class="form-select" id="inp-status">
            <option>예정</option><option>진행중</option><option>완료</option><option>보류</option>
          </select>
        </div>
      </div>
      <button class="btn-add" id="addBtn" onclick="addTask()">+ Task 추가</button>
    </div>
  </div>

</div>

<!-- DAY MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-date" id="modalDate"></div>
      <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('show')">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyBkY5IGIPC0CsJB55hui7wqCffcCiS33NI",
  authDomain:        "jnfam-task-plan.firebaseapp.com",
  databaseURL:       "https://jnfam-task-plan-default-rtdb.firebaseio.com",
  projectId:         "jnfam-task-plan",

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const tasksRef = ref(db, 'tasks');

let tasks = {};
let curYear  = new Date().getFullYear();
let curMonth = new Date().getMonth();

const today = new Date();
today.setHours(0,0,0,0);

document.getElementById('todayBadge').textContent =
  today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

function setSyncStatus(state) {
  const dot  = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  dot.className = 'sync-dot ' + state;
  if (state==='connected') text.textContent = '실시간 동기화 중';
  if (state==='syncing')   text.textContent = '저장 중...';
  if (state==='')          text.textContent = '연결 끊김';
}

onValue(tasksRef, (snapshot) => {
  tasks = snapshot.val() || {};
  setSyncStatus('connected');
  renderCalendar();
  if (document.getElementById('tab-list').style.display !== 'none') renderList();
}, (error) => {
  setSyncStatus('');
  showToast('연결 오류: ' + error.message, true);
});

function toDate(str) {
  const d = new Date(str + 'T00:00:00');
  d.setHours(0,0,0,0);
  return d;
}
function diffDays(dl) {
  return Math.round((toDate(dl) - today) / 86400000);
}
function taskClass(t) {
  if (t.status==='완료')   return 'done';
  if (t.status==='진행중') return 'inprog';
  const d = diffDays(t.deadline);
  if (d < 0)  return 'late';
  if (d <= 3) return 'soon';
  return 'plan';
}
function taskPrefix(t) {
  const c = taskClass(t);
  if (c==='done')   return '✓';
  if (c==='inprog') return '●';
  if (c==='late')   return '!';
  if (c==='soon')   return '◆';
  return '·';
}
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError?' error':'') + ' show';
  setTimeout(()=>t.className='toast', 2500);
}

window.switchTab = (name, btn) => {
  ['calendar','list','add'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name?'block':'none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (name==='list') renderList();
};

window.changeMonth = (d) => {
  curMonth += d;
  if (curMonth > 11) { curMonth=0; curYear++; }
  if (curMonth < 0)  { curMonth=11; curYear--; }
  renderCalendar();
};

function renderCalendar() {
  const MO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('monthTitle').textContent = `${curYear}년 ${MO[curMonth]}`;

  const first = new Date(curYear, curMonth, 1);
  let startDow = first.getDay();
  startDow = startDow===0 ? 6 : startDow-1;
  const calStart = new Date(first);
  calStart.setDate(calStart.getDate()-startDow);

  const byDate = {};
  const taskList = Object.entries(tasks);
  taskList.forEach(([key, t]) => {
    if (!t || !t.deadline) return;
    if (!byDate[t.deadline]) byDate[t.deadline] = [];
    byDate[t.deadline].push({...t, _key: key});
  });

  const mTasks = taskList.filter(([,t])=>t&&t.deadline&&t.deadline.startsWith(`${curYear}-${String(curMonth+1).padStart(2,'0')}`)).map(([,t])=>t);
  const total   = mTasks.length;
  const done    = mTasks.filter(t=>t.status==='완료').length;
  const inprog  = mTasks.filter(t=>t.status==='진행중').length;
  const delayed = mTasks.filter(t=>t.status!=='완료'&&diffDays(t.deadline)<0).length;

  document.getElementById('statsRow').innerHTML = [
    {l:'전체',  v:total,   c:'var(--text)',   bg:'var(--surface2)'},
    {l:'완료',  v:done,    c:'var(--green)',  bg:'var(--green-l)'},
    {l:'진행',  v:inprog,  c:'var(--accent)', bg:'var(--accent-l)'},
    {l:'지연',  v:delayed, c:'var(--red)',    bg:'var(--red-l)'},
    {l:'완료율',v:total?Math.round(done/total*100)+'%':'-', c:'var(--green)', bg:'var(--green-l)'},
  ].map(s=>`
    <div class="stat-chip" style="background:${s.bg}">
      <span style="color:var(--text3);font-size:11px">${s.l}</span>
      <span class="stat-val" style="color:${s.c}">${s.v}</span>
    </div>`).join('');

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // calStart(월요일)부터 6주치를 순서대로 날짜 iterate
  // 토/일은 하나의 주말 칸으로 합침 → 주당 6칸 출력
  for (let week=0; week<6; week++) {
    // 월~금 (5칸) — calStart+0~4, +7~11, ...
    for (let wd=0; wd<5; wd++) {
      const d = new Date(calStart);
      d.setDate(d.getDate() + week*7 + wd);
      const inMonth = d.getMonth()===curMonth && d.getFullYear()===curYear;
      const isToday = d.getTime()===today.getTime();
      const ds = d.toISOString().slice(0,10);
      const dayTasks = byDate[ds]||[];

      let cls = 'cal-day';
      if (!inMonth) cls+=' other-month';
      if (isToday)  cls+=' today';

      const MAX=3;
      const chips = dayTasks.slice(0,MAX).map(t=>
        `<div class="task-chip ${taskClass(t)}" onclick="openDayModal('${ds}',event)">
          ${taskPrefix(t)} ${t.text}
        </div>`).join('');
      const more = dayTasks.length>MAX?`<div class="task-more">+${dayTasks.length-MAX}개 더</div>`:'';

      const cell = document.createElement('div');
      cell.className = cls;
      cell.innerHTML = `
        <div class="day-num">
          <span>${d.getDate()}</span>
          ${isToday?'<span class="today-label">TODAY</span>':''}
        </div>${chips}${more}`;
      cell.onclick = (ev) => {
        if (ev.target===cell||ev.target.classList.contains('day-num')||ev.target.tagName==='SPAN')
          openDayModal(ds, ev);
      };
      grid.appendChild(cell);
    }

    // 주말 합친 칸: calStart+5=토, calStart+6=일
    const sat = new Date(calStart);
    sat.setDate(sat.getDate() + week*7 + 5);
    const sun = new Date(calStart);
    sun.setDate(sun.getDate() + week*7 + 6);

    const satDs = sat.toISOString().slice(0,10);
    const sunDs = sun.toISOString().slice(0,10);
    const satTasks = byDate[satDs]||[];
    const sunTasks = byDate[sunDs]||[];
    const inMonth = (sat.getMonth()===curMonth)||(sun.getMonth()===curMonth);

    const renderWkndDay = (d, ds, dayTasks, label) => {
      const isT = d.getTime()===today.getTime();
      const chips = dayTasks.slice(0,2).map(t=>
        `<div class="task-chip ${taskClass(t)}" style="font-size:9px;padding:2px 4px" onclick="openDayModal('${ds}',event)">
          ${taskPrefix(t)} ${t.text}
        </div>`).join('');
      const more = dayTasks.length>2?`<div class="task-more">+${dayTasks.length-2}</div>`:'';
      return `<div class="weekend-day-label">${label} ${d.getDate()}${isT?' <span class="today-label">TODAY</span>':''}</div>${chips}${more}`;
    };

    const wknd = document.createElement('div');
    wknd.className = 'cal-day weekend-cell'+(inMonth?'':' other-month');
    wknd.innerHTML = renderWkndDay(sat,satDs,satTasks,'토') + renderWkndDay(sun,sunDs,sunTasks,'일');
    grid.appendChild(wknd);
  }
}

window.openDayModal = (ds, e) => {
  if (e) e.stopPropagation();
  const d = new Date(ds+'T00:00:00');
  document.getElementById('modalDate').textContent =
    d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'});

  const dayTasks = Object.entries(tasks)
    .filter(([,t])=>t&&t.deadline===ds)
    .map(([k,t])=>({...t,_key:k}));

  const body = document.getElementById('modalBody');
  if (dayTasks.length===0) {
    body.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div>이 날짜에 Task가 없습니다</div>
      </div>
      <button class="btn-add-outline" onclick="prefillDate('${ds}')">+ 이 날짜에 Task 추가</button>`;
  } else {
    body.innerHTML = dayTasks.map(t => {
      const dd = diffDays(t.deadline);
      const ddTxt = t.status==='완료'?'완료됨':(dd<0?`${-dd}일 지연`:`D-${dd}`);
      const ddColor = t.status==='완료'?'var(--green)':(dd<0?'var(--red)':'var(--text2)');
      const cats = ['생산','출하','입고','점검','미팅','행정','기타'].map(c=>`<option${c===t.category?' selected':''}>${c}</option>`).join('');
      const prios = ['높음','보통','낮음'].map(p=>`<option${p===t.priority?' selected':''}>${p}</option>`).join('');
      return `
      <div class="modal-task-item" id="item-${t._key}">
        <button class="edit-btn" onclick="toggleEdit('${t._key}','${ds}')" title="편집">✏️</button>
        <button class="del-btn" onclick="deleteTask('${t._key}','${ds}')" title="삭제">×</button>
        <div class="modal-task-text">${t.text}</div>
        <div class="modal-task-meta">
          ${t.category?`<span class="meta-chip">${t.category}</span>`:''}
          ${t.worker?`<span class="meta-chip">👤 ${t.worker}</span>`:''}
          ${t.priority?`<span class="meta-chip">${t.priority}</span>`:''}
          <span class="meta-chip" style="color:${ddColor}">${ddTxt}</span>
          <select class="status-select" onchange="updateStatus('${t._key}',this.value,'${ds}')">
            ${['예정','진행중','완료','보류'].map(s=>`<option${s===t.status?' selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="edit-form" id="edit-${t._key}" style="display:none">
          <input class="edit-input" id="edit-text-${t._key}" value="${t.text.replace(/"/g,'&quot;')}" placeholder="Task 내용"/>
          <div class="edit-row">
            <input class="edit-input" id="edit-deadline-${t._key}" type="date" value="${t.deadline}"/>
            <input class="edit-input" id="edit-worker-${t._key}" value="${t.worker||''}" placeholder="담당자"/>
          </div>
          <div class="edit-row">
            <select class="edit-input" id="edit-cat-${t._key}">${cats}</select>
            <select class="edit-input" id="edit-prio-${t._key}">${prios}</select>
          </div>
          <div class="edit-row">
            <button class="edit-save" onclick="saveEdit('${t._key}','${ds}')">💾 저장</button>
            <button class="edit-cancel" onclick="toggleEdit('${t._key}','${ds}')">취소</button>
          </div>
        </div>
      </div>`;
    }).join('') +
    `<button class="btn-add-outline" onclick="prefillDate('${ds}')">+ 이 날짜에 Task 추가</button>`;
  }
  document.getElementById('modalOverlay').classList.add('show');
};

window.closeModal = (e) => {
  if (e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('show');
};

window.toggleEdit = (key, ds) => {
  const form = document.getElementById('edit-'+key);
  form.style.display = form.style.display==='none' ? 'block' : 'none';
};

window.saveEdit = async (key, ds) => {
  const text     = document.getElementById('edit-text-'+key).value.trim();
  const deadline = document.getElementById('edit-deadline-'+key).value;
  const worker   = document.getElementById('edit-worker-'+key).value.trim();
  const category = document.getElementById('edit-cat-'+key).value;
  const priority = document.getElementById('edit-prio-'+key).value;
  if (!text || !deadline) { showToast('내용과 마감일을 입력하세요', true); return; }
  setSyncStatus('syncing');
  await update(ref(db, 'tasks/'+key), { text, deadline, worker, category, priority });
  setSyncStatus('connected');
  showToast('✅ 수정됐어요!');
  openDayModal(ds, null);
};

window.updateStatus = async (key, val, ds) => {
  setSyncStatus('syncing');
  await update(ref(db, 'tasks/'+key), {status: val});
  setSyncStatus('connected');
  showToast('✓ 상태 업데이트됨');
  openDayModal(ds, null);
};

window.deleteTask = async (key, ds) => {
  if (!confirm('이 Task를 삭제할까요?')) return;
  setSyncStatus('syncing');
  await remove(ref(db, 'tasks/'+key));
  setSyncStatus('connected');
  showToast('🗑 Task 삭제됨');
  openDayModal(ds, null);
};

window.addTask = async () => {
  const text = document.getElementById('inp-text').value.trim();
  const dl   = document.getElementById('inp-deadline').value;
  if (!text||!dl) { showToast('Task 내용과 마감일을 입력하세요', true); return; }
  const btn = document.getElementById('addBtn');
  btn.disabled = true; btn.textContent = '저장 중...';
  setSyncStatus('syncing');
  await push(tasksRef, {
    text, deadline: dl,
    worker:   document.getElementById('inp-worker').value.trim()||'',
    category: document.getElementById('inp-cat').value,
    priority: document.getElementById('inp-prio').value,
    status:   document.getElementById('inp-status').value,
    createdAt: new Date().toISOString(),
  });
  setSyncStatus('connected');
  btn.disabled=false; btn.textContent='+ Task 추가';
  document.getElementById('inp-text').value='';
  document.getElementById('inp-worker').value='';
  showToast('✓ Task가 추가되었습니다!');
  const [y,m] = dl.split('-').map(Number);
  curYear=y; curMonth=m-1;
  switchTab('calendar', document.querySelectorAll('.tab')[0]);
};

window.prefillDate = (ds) => {
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('inp-deadline').value = ds;
  switchTab('add', document.querySelectorAll('.tab')[2]);
};

function renderList() {
  const fs = document.getElementById('filterStatus').value;
  const fm = document.getElementById('filterMonth').value;
  const fc = document.getElementById('filterCat').value;
  let list = Object.entries(tasks)
    .filter(([,t])=>t&&t.deadline)
    .map(([k,t])=>({...t,_key:k}));
  if (fs) list = list.filter(t=>t.status===fs);
  if (fm) list = list.filter(t=>t.deadline.startsWith(`${curYear}-${fm}`));
  if (fc) list = list.filter(t=>t.category===fc);
  list.sort((a,b)=>a.deadline.localeCompare(b.deadline));

  const ddClass = (t) => {
    if (t.status==='완료') return 'done';
    const d=diffDays(t.deadline);
    return d<0?'late':(d<=3?'soon':'ok');
  };
  const ddText = (t) => {
    if (t.status==='완료') return '✓';
    const d=diffDays(t.deadline);
    return d<0?`-${-d}일`:`D-${d}`;
  };

  document.getElementById('listContainer').innerHTML = list.length
    ? list.map(t=>`
      <div class="list-item">
        <div>
          <div class="list-text">${t.text}</div>
          <div class="list-meta">${t.worker||''} ${t.worker&&t.category?'·':''} ${t.category||''}</div>
        </div>
        <div class="list-meta">${t.deadline}</div>
        <div class="dday ${ddClass(t)}">${ddText(t)}</div>
        <div class="list-meta">${t.category||'-'}</div>
        <div>
          <select class="status-select" onchange="updateStatusList('${t._key}',this.value)">
            ${['예정','진행중','완료','보류'].map(s=>`<option${s===t.status?' selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>`).join('')
    : '<div class="empty"><div class="empty-icon">📭</div><div>Task가 없습니다</div></div>';
}

// ── 필터 적용된 리스트 가져오기 (다운로드용 공통 함수) ──
function getFilteredList() {
  const fs = document.getElementById('filterStatus').value;
  const fm = document.getElementById('filterMonth').value;
  const fc = document.getElementById('filterCat').value;
  let list = Object.entries(tasks)
    .filter(([,t])=>t&&t.deadline)
    .map(([k,t])=>({...t,_key:k}));
  if (fs) list = list.filter(t=>t.status===fs);
  if (fm) list = list.filter(t=>t.deadline.startsWith(`${curYear}-${fm}`));
  if (fc) list = list.filter(t=>t.category===fc);
  list.sort((a,b)=>a.deadline.localeCompare(b.deadline));
  return list;
}

// ── CSV 다운로드 ──────────────────────────────────────
window.downloadCSV = () => {
  const list = getFilteredList();
  if (!list.length) { showToast('다운로드할 데이터가 없어요', true); return; }

  const headers = ['Task 내용','마감일','담당자','카테고리','우선순위','상태'];
  const rows = list.map(t => [
    `"${(t.text||'').replace(/"/g,'""')}"`,
    t.deadline||'',
    `"${(t.worker||'').replace(/"/g,'""')}"`,
    t.category||'',
    t.priority||'',
    t.status||''
  ]);

  const csvContent = '﻿' + // BOM: 한글 깨짐 방지
    [headers, ...rows].map(r=>r.join(',')).join('
');

  const blob = new Blob([csvContent], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const month = document.getElementById('filterMonth').value || '전체';
  a.href = url;
  a.download = `JNFAM_Task_${curYear}년_${month}월_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ CSV 다운로드 완료!');
};

onValue(tasksRef, async (snap) => {
